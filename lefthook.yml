pre-commit:
  parallel: true
  commands:
    spellcheck:
      run: pnpm spellcheck

    prettier:
      glob: "**/*.{js,jsx,ts,tsx,json,css,html}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    eslint:
      glob: "**/*.{js,jsx,ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    lint:
      run: pnpm lint
    audit:
      run: pnpm audit
    # test:
    #   run: pnpm test
    build:
      run: pnpm build
